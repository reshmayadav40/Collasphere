<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="cards">

        <div class="flip-container">
            <input type="checkbox" id="flip1">
            <label class="flip-card" for="flip1">
                <div class="front">What is HTML?</div>
                <div class="back">HTML (HyperText Markup Language) is used to structure content on a web page.</div>
            </label>
        </div>

        <div class="flip-container">
            <input type="checkbox" id="flip2">
            <label class="flip-card" for="flip2">
                <div class="front">What is the purpose of the div tag?</div>
                <div class="back">div is a block-level container used to group HTML elements.</div>
            </label>
        </div>

        <div class="flip-container">
            <input type="checkbox" id="flip3">
            <label class="flip-card" for="flip3">
                <div class="front"><p>What is CSS?</p></div>
                <div class="back"><p>CSS (Cascading Style Sheets) is used to style and design web pages.</p></div>
            </label>
        </div>

        <div class="flip-container">
            <input type="checkbox" id="flip4">
            <label class="flip-card" for="flip4">
                <div class="front"><p>What does display: flex; do?</p></div>
                <div class="back"><p>display: flex; creates a flexible container that allows items to be laid out in a flexible way.</p></div>
            </label>
        </div>

        <div class="flip-container">
            <input type="checkbox" id="flip5">
            <label class="flip-card" for="flip5">
                <div class="front"><p>What is JavaScript?</p></div>
                <div class="back"><p>JavaScript is a programming language that enables interactive web pages.</p></div>
            </label>
        </div>

        <div class="flip-container">
            <input type="checkbox" id="flip6">
            <label class="flip-card" for="flip6">
                <div class="front"><p>What is a variable in JavaScript?</p></div>
                <div class="back"><p>A variable in JavaScript is a container for storing data values.</p></div>
            </label>
        </div>

        <div class="flip-container">
            <input type="checkbox" id="flip7">
            <label class="flip-card" for="flip7">
                <div class="front"><p>What is the difference between id and class?</p></div>
                <div class="back"><p>An id is unique to an element, while a class can be shared among multiple elements.</p></div>
            </label>
        </div>

        <div class="flip-container">
            <input type="checkbox" id="flip8">
            <label class="flip-card" for="flip8">
                <div class="front"><p>What is an event in JavaScript?</p></div>
                <div class="back"><p>An event in JavaScript is an action that occurs in response to user interaction or system events.</p></div>
            </label>
        </div>

          <div class="flip-container">
            <input type="checkbox" id="flip9">
            <label class="flip-card" for="flip9">
                <div class="front"><p>What is a semantic HTML tag?</p></div>
                <div class="back"><p>A semantic HTML tag provides meaning to the content it contains, making the code more readable and accessible.</p></div>
            </label>
        </div>

        <div class="flip-container">
            <input type="checkbox" id="flip10">
            <label class="flip-card" for="flip10">
                <div class="front"><p>What does console.log() do in JavaScript?</p></div>
                <div class="back"><p>console.log() outputs a message to the browser console for debugging purposes.</p></div>
            </label>
        </div>
    </div>

</body>

</html>
